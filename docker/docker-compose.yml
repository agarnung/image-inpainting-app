# Qt GUI app (WSLg / X11 on the host).
# Build: DOCKER_BUILDKIT=1 docker compose build
# Run:   docker compose run --rm app
#
# The ./data folder (relative to this compose file) is bind-mounted to /data
# inside the container. That path is also the default "Import image" directory
# (see APP_IMAGES_DIR), so images you drop in ./data appear immediately in the
# file dialog. Exported images land there too.

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: image-inpainting-app:local
    volumes:
      - ./data:/data
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      DISPLAY: "${DISPLAY:-:0}"
      QT_X11_NO_MITSHM: "1"
      APP_IMAGES_DIR: "/data"
